name: Fahrplan aktualisieren

# Holt wöchentlich die offiziellen Fahrpläne (DB Sylt Shuttle + RDC Autozug Sylt),
# prüft sie streng und committet timetable.json, wenn sich etwas geändert hat.
# Bei Abruf-/Validierungsfehler bricht der Job ab (Fail-Safe) und GitHub
# benachrichtigt – es werden KEINE fehlerhaften Daten ausgespielt.
# Die App "Sylt Autozug" lädt diese Datei per Raw-URL.

on:
  schedule:
    - cron: "17 4 * * 1"   # jeden Montag 04:17 UTC
  workflow_dispatch:        # manuell auslösbar

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Der blaue Fahrplan wird aus dem offiziellen PDF gelesen – die HTML-Seite
      # zeigt nur die Abfahrten des gewählten Tages und verschweigt die
      # Wochentagsregeln. pdftotext steckt in poppler-utils.
      - name: pdftotext bereitstellen
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Fahrpläne abrufen, prüfen & schreiben
        run: python3 update_timetable.py

      - name: Änderungen committen
        run: |
          if ! git diff --quiet -- timetable.json; then
            git config user.name "sylt-autozug-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add timetable.json
            git commit -m "Fahrplan automatisch aktualisiert ($(date -u +%Y-%m-%d))"
            git push
            echo "Fahrplan aktualisiert und gepusht."
          else
            echo "Keine Änderung – nichts zu committen."
          fi
